name: Build amd64 and arm64 Static Binaries

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: read


jobs:
  build-static-tarball-amd64:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-kata-static-tarball-amd64.yaml
    with:
      push-to-registry: "no"
      stage: "test"
    secrets:
      QUAY_DEPLOYER_PASSWORD: ""
      KBUILD_SIGN_PIN: ""

  build-static-tarball-arm64:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-kata-static-tarball-arm64.yaml
    with:
      push-to-registry: "no"
      stage: "test"
    secrets:
      QUAY_DEPLOYER_PASSWORD: ""
